<!DOCTYPE html>
<html>

<head>

<title>Product Menu</title>


<style>


body{

background:#fff7e6;
font-family:Verdana;
margin:20px;

}


h1{

text-align:center;
color:#d35400;
font-size:40px;

}



.container{

display:flex;

justify-content:center;

gap:25px;

flex-wrap:wrap;

}



.card{


background:white;

width:220px;

padding:20px;

border:3px solid orange;

border-radius:20px;

text-align:center;

box-shadow:5px 5px 15px gray;


}



.card:hover{

transform:scale(1.08);

background:#ffeaa7;

}



.card img{


width:180px;

height:150px;

border-radius:15px;


}



.price{

color:red;

font-size:20px;

font-weight:bold;


}



a{

text-decoration:none;

color:blue;

font-size:18px;

}


</style>


</head>



<body>


<h1>
Product Menu
</h1>


<div class="container">



<div class="card">

<img src="laptops.webp">

<h2>Laptop</h2>

<p class="price">
Rs.65000
</p>

View Details
</a>

</div>



<div class="card">

<img src="phone.jpg">

<h2>Mobile</h2>

<div class="card">

<img src="tab.jpg">

<p class="price">
Rs.15000

</a>

</div>




<div class="card">

<img src="mouse.jpg">

</a>

</div>

</html>
